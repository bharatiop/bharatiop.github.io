title: "NAP Lab"
description: "Nuclear Astrophysics & Physics Laboratory at NIT Rourkela, India. Research on neutron stars, equation of state, dark matter, and multi-messenger astrophysics."
baseurl: ""
url: "https://bharatiop.github.io"

# Build
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: default

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
